<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskTracker | Portfolio Project</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Portfolio Project (made by Tobs)</p>
        <h1>TaskTracker WebTool</h1>
        <p class="hero-copy">Track your daily tasks, set priorities, and stay focused with an intuitive task manager built with HTML, CSS, and JavaScript.</p>
      </div>
      <div class="project-badge">Vanilla JS · Responsive · Local Storage</div>
    </header>

    <section class="task-form-panel">
      <form id="task-form" class="task-form" autocomplete="off">
        <div class="field-group">
          <label for="task-title">Task</label>
          <input id="task-title" name="task-title" type="text" placeholder="Add a new task" required />
        </div>
        <div class="field-group">
          <label for="task-date">Due</label>
          <input id="task-date" name="task-date" type="date" />
        </div>
        <div class="field-group">
          <label for="task-priority">Priority</label>
          <select id="task-priority" name="task-priority">
            <option value="medium" selected>Medium</option>
            <option value="high">High</option>
            <option value="low">Low</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary">Add Task</button>
      </form>

      <div class="task-controls">
        <input id="task-search" type="search" placeholder="Search tasks..." />
        <div class="filter-group" role="group" aria-label="Task filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="active">Active</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
        </div>
      </div>
    </section>

    <section class="task-list-panel">
      <div class="panel-header">
        <h2>Tasks</h2>
        <button id="clear-completed" class="btn btn-secondary">Clear completed</button>
      </div>
      <ul id="task-list" class="task-list" aria-live="polite"></ul>
      <p id="empty-state" class="empty-state">No tasks yet. Add a task to get started.</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
